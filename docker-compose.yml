services:
  ssl-init:
    image: alpine/openssl
    volumes:
      - ssl_certs:/etc/ssl
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ ! -f /etc/ssl/cert.crt ]; then
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
            -keyout /etc/ssl/cert.key \
            -out /etc/ssl/cert.crt \
            -subj '/C=RU/ST=Moscow/L=Moscow/O=VKR/CN=localhost' && \
          chmod 600 /etc/ssl/cert.key && \
          echo 'Certificate generated.'
        else
          echo 'Certificate already exists, skipping.'
        fi
        if [ ! -f /etc/ssl/dhparam.pem ]; then
          openssl dhparam -out /etc/ssl/dhparam.pem 4096 && \
          echo 'DH params generated.'
        else
          echo 'DH params already exist, skipping.'
        fi

  fastapi:
    build: .
    restart: unless-stopped
    volumes:
      - media:/media
      - ./checkpoints:/app/checkpoints:ro
    environment:
      - UPLOADS_DIR=/media/uploads
      - PROCESSED_DIR=/media/processed
    expose:
      - "8000"
    depends_on:
      ssl-init:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl_certs:/etc/ssl:ro
      - media:/media:ro
    depends_on:
      ssl-init:
        condition: service_completed_successfully
      fastapi:
        condition: service_started

volumes:
  ssl_certs:
  media:
